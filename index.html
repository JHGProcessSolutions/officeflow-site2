<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfficeFlow</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#ffffff;">
  
  <div style="text-align:center;">

    <h1 style="margin-bottom:16px;">OfficeFlow</h1>

    <p style="margin-bottom:32px; font-size:18px;">
      Start je abonnement om OfficeFlow te gebruiken
    </p>

    <!-- Stripe knop -->
    <button
      id="checkout-button"
      style="padding:16px 32px; font-size:16px; cursor:pointer; border:1px solid #000; background:#fff;"
    >
      Start abonnement
    </button>

  </div>

  <script>
    const button = document.getElementById("checkout-button");

    button.onclick = async () => {
      button.innerText = "Laden...";
      button.disabled = true;

      try {
        const res = await fetch(
          "https://ai-mail-assistant-production-979f.up.railway.app/billing/create-checkout-session",
          {
            method: "POST"
          }
        );

        if (!res.ok) {
          throw new Error("Server gaf geen geldige response");
        }

        const data = await res.json();

        if (!data.url) {
          throw new Error("Geen checkout URL ontvangen");
        }

        // redirect naar Stripe
        window.location.href = data.url;

      } catch (err) {
        alert("Er ging iets mis met het starten van de betaling.");
        console.error(err);

        button.innerText = "Start abonnement";
        button.disabled = false;
      }
    };
  </script>

</body>
</html>
