<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfficeFlow</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#ffffff;">
  
  <div style="text-align:center;">
    
    <h1 style="margin-bottom:16px;">OfficeFlow</h1>

    <p style="margin-bottom:32px; font-size:18px;">
      Verbind je Gmail-account om te starten
    </p>

    <!-- Gmail connect -->
    <a href="https://ai-mail-assistant-production-979f.up.railway.app/auth/google/start" style="text-decoration:none;">
      <button style="padding:16px 32px; font-size:16px; cursor:pointer; border:1px solid #000; background:#fff;">
        Connect Gmail
      </button>
    </a>

    <div style="height:16px;"></div>

    <!-- Success pagina -->
    <a href="/success.html" style="text-decoration:none;">
      <button style="padding:16px 32px; font-size:16px; cursor:pointer; border:1px solid #000; background:#fff;">
        Success pagina
      </button>
    </a>

    <div style="height:16px;"></div>

    <!-- 🔥 NIEUWE: Checkout knop -->
    <button id="checkout-button" style="padding:16px 32px; font-size:16px; cursor:pointer; border:1px solid #000; background:#fff;">
      Start abonnement
    </button>

  </div>

  <!-- 🔥 JS voor Stripe checkout -->
  <script>
    document.getElementById("checkout-button").onclick = async () => {
      const res = await fetch("https://ai-mail-assistant-production.up.railway.app/billing/create-checkout-session", {
        method: "POST"
      })

      const data = await res.json()

      window.location.href = data.url
    }
  </script>

</body>
</html>
